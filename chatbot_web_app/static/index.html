<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLM Neural Workspace</title>
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0F19;
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg-bg: rgba(99, 102, 241, 0.15);
            --user-msg-border: rgba(99, 102, 241, 0.3);
            --bot-msg-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract glowing background orbs */
        .orb-1, .orb-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #ec4899;
            bottom: -150px;
            right: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .chat-container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--glass-shadow);
            z-index: 1;
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(168, 85, 247, 0.15);
            color: #d8b4fe;
            border: 1px solid rgba(168, 85, 247, 0.3);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .messages {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .messages::-webkit-scrollbar-track { background: transparent; }

        .message-row {
            display: flex;
            gap: 16px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .user-row {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--glass-border);
        }

        .bot-row .avatar {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
            border: 1px solid rgba(236, 72, 153, 0.3);
        }
        
        .user-row .avatar {
            background: rgba(255, 255, 255, 0.1);
        }

        .avatar svg {
            width: 18px;
            height: 18px;
            fill: var(--text-main);
        }

        .message {
            max-width: 75%;
            padding: 16px 22px;
            border-radius: 24px;
            font-size: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .bot-msg {
            background: var(--bot-msg-bg);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
        }

        .user-msg {
            background: var(--user-msg-bg);
            border: 1px solid var(--user-msg-border);
            backdrop-filter: blur(10px);
            border-top-right-radius: 4px;
        }

        .input-area {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 16px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 24px;
            border-radius: 100px;
            color: white;
            font-size: 1.05rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
        }

        input::placeholder { color: var(--text-muted); font-weight: 300; }

        button {
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.15);
            opacity: 0;
            transition: opacity 0.3s;
        }

        button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 12px 30px rgba(168, 85, 247, 0.6);
        }

        button:hover::before { opacity: 1; }
        
        button:active { transform: translateY(0) scale(0.95); }

        button:disabled {
            background: #334155;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transform: translateX(2px);
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 18px 22px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-4px); opacity: 1; background: #a855f7; }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .chat-container { width: 100%; height: 100%; border-radius: 0; border: none; }
            .orb-1, .orb-2 { display: none; }
            .header { padding: 20px; }
            .messages { padding: 20px; gap: 16px; }
            .message { max-width: 85%; padding: 14px 18px; font-size: 0.95rem; }
            .input-area { padding: 16px 20px; }
            input { padding: 16px 20px; }
            button { width: 54px; height: 54px; }
        }
    </style>
</head>
<body>

<div class="orb-1"></div>
<div class="orb-2"></div>

<div class="chat-container">
    <div class="header">
        <div class="header-content">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div>
                <h1>SLM Neural Workspace</h1>
                <p>Locally Computed • Langchain Powered</p>
            </div>
        </div>
        <div class="badge">Online</div>
    </div>
    
    <div class="messages" id="messagesBox">
        <div class="message-row bot-row">
            <div class="avatar">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            </div>
            <div class="message bot-msg">
                Welcome to your interactive AI workspace! I am fueled by the Small Language Model you trained from scratch in PyTorch. How can I assist you today?
            </div>
        </div>
        
        <div id="typingContainer" class="message-row bot-row" style="display: none; align-items: center;">
            <div class="avatar">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            </div>
            <div class="message bot-msg typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Message your AI..." autocomplete="off">
        </div>
        <button id="sendBtn" aria-label="Send Message">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesBox = document.getElementById('messagesBox');
    const typingContainer = document.getElementById('typingContainer');

    function createSVG(isUser) {
        if(isUser) {
            return `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
        } else {
            return `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>`;
        }
    }

    function appendMessageToUI(text, isUser) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'message-row ' + (isUser ? 'user-row' : 'bot-row');
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'avatar';
        avatarDiv.innerHTML = createSVG(isUser);

        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (isUser ? 'user-msg' : 'bot-msg');
        msgDiv.textContent = text;
        
        rowDiv.appendChild(avatarDiv);
        rowDiv.appendChild(msgDiv);

        messagesBox.insertBefore(rowDiv, typingContainer);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        // Reset UI state
        inputEl.value = '';
        inputEl.disabled = true;
        sendBtn.disabled = true;
        
        appendMessageToUI(text, true);
        
        // Show typing indicator
        typingContainer.style.display = 'flex';
        // Move typing indicator to very bottom
        messagesBox.appendChild(typingContainer); 
        messagesBox.scrollTop = messagesBox.scrollHeight;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: text })
            });

            if (!res.ok) throw new Error("Network response was not ok");
            
            const data = await res.json();
            const botReply = data.response || "No response generated.";
            
            appendMessageToUI(botReply, false);
            
        } catch (err) {
            console.error("Fetch Error: ", err);
            appendMessageToUI("Error: Unable to reach the language model.", false);
        } finally {
            typingContainer.style.display = 'none';
            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
